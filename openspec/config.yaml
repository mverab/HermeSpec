schema: spec-driven

context: |
  HermeSpec provides a Python 3.11+ stdio MCP server named `openspec-mcp`.
  The MVP manages OpenSpec-backed agent contracts for `scheduled_task`,
  `external_action`, and `research` contract types. The server creates proposal,
  task, and spec artifacts, records approval or rejection events in
  `openspec/approvals.jsonl`, and archives completed changes. Hermes remains
  responsible for execution and must not execute a contract before explicit
  approval.

rules:
  goal:
    - Use measurable completion conditions, including concrete verification commands.
    - Include a bounded stop condition for the work.
  proposal:
    - State active contract types explicitly when the change affects MVP scope.
    - Keep execution separate from proposal and approval lifecycle behavior.
  tasks:
    - Use checkable tasks with concrete files or commands where possible.
  agent-team:
    - Use 3-5 workers for coordinated implementation work.
    - Assign disjoint ownership scopes and do not revert another worker's edits.
